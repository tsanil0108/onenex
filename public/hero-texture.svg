<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#241512" fill-opacity="0.07" />
    </pattern>
  </defs>
  <rect width="220" height="220" fill="url(#dots)" />

  <!-- print registration marks, scattered -->
  <g stroke="#241512" stroke-opacity="0.09" stroke-width="1">
    <g transform="translate(20,20)">
      <circle r="9" fill="none" />
      <line x1="-13" y1="0" x2="13" y2="0" />
      <line x1="0" y1="-13" x2="0" y2="13" />
    </g>
    <g transform="translate(180,60)">
      <circle r="6" fill="none" />
      <line x1="-9" y1="0" x2="9" y2="0" />
      <line x1="0" y1="-9" x2="0" y2="9" />
    </g>
    <g transform="translate(60,170)">
      <circle r="7" fill="none" />
      <line x1="-10" y1="0" x2="10" y2="0" />
      <line x1="0" y1="-10" x2="0" y2="10" />
    </g>
    <g transform="translate(150,190)">
      <circle r="5" fill="none" />
      <line x1="-8" y1="0" x2="8" y2="0" />
      <line x1="0" y1="-8" x2="0" y2="8" />
    </g>
  </g>
</svg>